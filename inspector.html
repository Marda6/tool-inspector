<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ENCY Core — Inspector</title>
<style>
  :root{
    --ec-bg:#0e1010; --ec-bg-96:rgba(14,16,16,.96); --ec-bg-80:rgba(14,16,16,.80);
    --ec-fg-100:#f5f5f5; --ec-fg-96:rgba(245,245,245,.96); --ec-fg-80:rgba(245,245,245,.80);
    --ec-fg-72:rgba(245,245,245,.72); --ec-fg-64:rgba(245,245,245,.64); --ec-fg-56:rgba(245,245,245,.56);
    --ec-fg-24:rgba(245,245,245,.24); --ec-fg-16:rgba(245,245,245,.16); --ec-fg-12:rgba(245,245,245,.12); --ec-fg-8:rgba(245,245,245,.08);
    --ec-fg-4:rgba(245,245,245,.04);
    --ec-green:#00a36d;
    --ec-yellow:#ffc400;
    --ec-font:'Inter','Inter var',system-ui,-apple-system,'Segoe UI',sans-serif;
  }
  *{box-sizing:border-box}
  html,body{height:100%}
  body{margin:0;background:var(--ec-bg);color:var(--ec-fg-72);font-family:var(--ec-font);
    font-size:12px;line-height:16px;-webkit-font-smoothing:antialiased;}
  img{display:block}

  /* ===== Host: center the standalone inspector panel ===== */
  .app{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;padding:16px;}
  .insp-host{width:341px;height:500px;display:flex;flex-direction:column;min-height:0;}

  .panel16{background:var(--ec-fg-16);border-radius:10px;padding:2px;display:flex;min-height:0;}
  .panel-insp{flex:1 1 auto;gap:2px;}

  /* ---- Scrollbars (thin, dark, no arrows) ---- */
  *{scrollbar-width:thin;scrollbar-color:var(--ec-fg-16) transparent;}
  ::-webkit-scrollbar{width:8px;height:8px;}
  ::-webkit-scrollbar-track{background:transparent;}
  ::-webkit-scrollbar-thumb{background:var(--ec-fg-16);border-radius:8px;
    border:2px solid transparent;background-clip:padding-box;}
  ::-webkit-scrollbar-thumb:hover{background:var(--ec-fg-24);background-clip:padding-box;}
  ::-webkit-scrollbar-button{display:none;width:0;height:0;}
  ::-webkit-scrollbar-corner{background:transparent;}
  .inner{background:var(--ec-bg-80);border-radius:8px;padding:4px;display:flex;flex-direction:column;
    gap:6px;flex:1 1 0;min-height:0;overflow:hidden;}

  .i16{width:16px;height:16px}
  .line{height:1px;width:100%;background:var(--ec-fg-8);flex:0 0 1px;}

  /* shared label/chevron/pair bits reused by inspector rows */
  .shev{width:12px;height:20px;flex:0 0 12px;transition:transform .12s ease;}
  .shev.exp{cursor:pointer;}
  .rlabel{display:flex;align-items:center;height:20px;padding:0 2px;min-width:0;}
  .rlabel span{color:var(--ec-fg-96);font:400 12px/16px var(--ec-font);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .bicn{display:flex;align-items:center;justify-content:center;padding:2px;border-radius:4px;flex:0 0 auto;}

  /* ===== Inspector rail + panel (38:5163) ===== */
  .rail{display:flex;flex-direction:column;justify-content:space-between;height:100%;width:28px;flex:0 0 28px;}
  .rail-top{display:flex;flex-direction:column;gap:2px;width:28px;}
  .rbtn{display:flex;align-items:center;padding:4px;border-radius:8px;cursor:pointer;}
  .rbtn:hover{background:var(--ec-fg-4);}
  .rbtn.active{background:var(--ec-bg-96);}
  .ricn{width:20px;height:20px}
  .title-row{display:flex;align-items:center;gap:4px;min-height:28px;padding:2px 2px 2px 8px;border-radius:6px;}
  .title-row .t{color:var(--ec-fg-96);font:600 14px/20px var(--ec-font);padding-right:8px;}
  .title-row .crumb-mut{color:var(--ec-fg-56);font-weight:400;cursor:pointer;}  /* breadcrumb root: dimmed + regular weight; acts as Back */
  .title-row .crumb-mut:hover{color:var(--ec-fg-96);}
  .title-row .crumb-sep{color:var(--ec-fg-24);margin:0 6px;font-weight:400;}
  .title-row .crumb-cur{color:var(--ec-fg-96);}                  /* breadcrumb current: bright + bold */
  .title-ctl{flex:1 1 0;display:flex;justify-content:flex-end;min-width:0;gap:4px;}
  .title-ctl .dropdown{flex:0 1 auto;max-width:300px;}
  .irows{display:flex;flex-direction:column;gap:2px;overflow:auto;flex:1 1 0;min-height:0;}
  .irows > *{flex:0 0 auto;}
  .irow{display:flex;align-items:center;gap:2px;padding:2px;border-radius:6px;width:100%;cursor:pointer;}
  .irow:hover{background:var(--ec-fg-8);}
  .irow.sel{background:var(--ec-fg-12);}
  .ilbl{display:flex;align-items:center;flex:1 1 0;min-width:0;}
  .hint{width:12px;height:20px;flex:0 0 12px;visibility:hidden;}
  .irow:hover .hint,.irow.sel .hint{visibility:visible;}
  .itl{display:flex;align-items:center;flex:1 1 0;min-width:0;}
  .itl.i1{padding-left:8px}.itl.i2{padding-left:16px}
  .ictl{display:flex;align-items:center;justify-content:flex-end;gap:2px;flex:1 1 0;min-width:0;overflow:hidden;}
  .ictl.between{justify-content:space-between;}
  .dropdown{background:var(--ec-fg-4);display:flex;align-items:center;justify-content:space-between;
    flex:1 1 0;min-width:0;padding:2px 2px 2px 4px;border-radius:4px;cursor:pointer;}
  .dropdown:hover{background:var(--ec-fg-8);}
  .dropdown.dd-open{background:var(--ec-fg-8);box-shadow:inset 0 0 0 1px var(--ec-fg-16);}
  .dropdown .v,.input .v{color:var(--ec-fg-72);font:400 12px/16px var(--ec-font);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .dropdown .v{flex:1;min-width:0;}
  .input{background:var(--ec-fg-4);display:flex;align-items:center;flex:1 1 0;min-width:0;padding:2px 2px 2px 4px;border-radius:4px;}
  .input:focus-within{background:var(--ec-fg-8);box-shadow:inset 0 0 0 1px var(--ec-fg-16);}
  .input .vin{flex:1 1 0;min-width:0;width:100%;background:transparent;border:0;outline:none;
    color:var(--ec-fg-72);font:400 12px/16px var(--ec-font);padding:0;}
  .icn11{width:12px;height:20px;flex:0 0 12px;cursor:pointer;visibility:hidden;}
  .irow:hover .icn11,.irow.sel .icn11{visibility:visible;}
  .tgl{width:24px;height:14px;flex:0 0 24px;cursor:pointer;}
  .ipair{display:flex;align-items:center;gap:2px;width:85.75px;flex:0 0 85.75px;}
  /* ---- Tool tab extras ---- */
  .rlabel span.b{font-weight:400;}
  .roval{flex:1 1 0;min-width:0;color:var(--ec-fg-56);font:400 12px/16px var(--ec-font);padding:2px 4px;
    white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .irow.roparam .rlabel span{color:var(--ec-fg-56);}
  .irow .shev.exp{cursor:pointer;}
  .irow.collapsed .shev.exp{transform:rotate(-90deg);}
  .irows .line{margin:4px 0;}
  /* assembly stack graph (Fork-style, monochrome): node per component + connecting line, magazine → … → tool */
  .comp{position:relative;padding-left:18px;}
  .comp.chain::before,.comp.chain-thru::before{content:'';position:absolute;left:8px;top:0;bottom:-2px;width:1px;background:var(--ec-fg-24);pointer-events:none;}
  .comp.chain.chain-top::before{top:50%;}
  .comp.chain.chain-bottom::before{bottom:50%;}
  /* node doubles as a per-component lock control: dot by default, lock glyph when fixed */
  .gnode{position:absolute;left:5.5px;top:50%;width:6px;height:6px;margin-top:-3px;border-radius:50%;background:var(--ec-fg-56);cursor:pointer;}
  .gnode::after{content:'';position:absolute;left:-7px;top:-8px;width:20px;height:22px;}/* larger click target */
  .irow:hover .gnode{background:var(--ec-fg-100);}
  .gnode.locked,.irow:hover .gnode.locked{width:12px;height:12px;margin-top:-6px;left:2px;border-radius:0;
    background:transparent;color:var(--ec-yellow);display:flex;align-items:center;justify-content:center;}
  .gnode.locked svg{display:block;}
  .icap{padding:2px 4px 2px 28px;color:var(--ec-fg-56);font:400 12px/16px var(--ec-font);}
  .sel-hint{padding:2px 8px 4px;color:var(--ec-fg-56);font:400 12px/16px var(--ec-font);}
  /* pinned footer: operations + live overhang, full width at the panel bottom regardless of scroll */
  .inspfoot{flex:0 0 auto;}
  .sel-foot{display:flex;align-items:center;gap:10px;padding:7px 8px 3px;
    border-top:1px solid var(--ec-fg-8);
    color:var(--ec-fg-56);font:400 12px/16px var(--ec-font);}
  .sel-foot .sb-sep{flex:0 0 1px;width:1px;height:11px;background:var(--ec-fg-16);}
  .search-row{display:flex;padding:2px;}
  .search-box{flex:1 1 0;padding:0;}
  .search-row .filterbtn{flex:0 0 24px;width:24px;height:24px;margin-left:4px;}
  .search-box input{flex:1 1 0;min-width:0;background:transparent;border:0;outline:none;
    color:var(--ec-fg-96);font:400 12px/16px var(--ec-font);padding:2px 8px;}
  .search-box input::placeholder{color:var(--ec-fg-56);}
  .ilist-item{padding:3px 6px 3px 26px;border-radius:4px;color:var(--ec-fg-72);
    font:400 12px/16px var(--ec-font);cursor:pointer;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .ilist-item:hover{background:var(--ec-fg-8);}
  .ilist-item.sel{background:var(--ec-fg-12);color:var(--ec-fg-96);}
  /* library = expandable ready-made assemblies */
  .lib-item{padding-left:6px;}
  .lib-item .asm-name{padding-left:2px;} /* match the chevron→label gap of normal rows */
  .libchev{flex:0 0 12px;cursor:pointer;}
  .libchev.collapsed{transform:rotate(-90deg);}
  /* ---- Tool Assembly workflow ---- */
  .tact{border:0;background:transparent;color:var(--ec-fg-72);font:400 12px/16px var(--ec-font);
    padding:3px 8px;border-radius:4px;cursor:pointer;}
  .tact:hover{color:var(--ec-fg-96);background:var(--ec-fg-8);}
  .tact.apply{background:var(--ec-fg-16);color:var(--ec-fg-96);}
  .tact.apply:hover{background:var(--ec-fg-24);}
  .tact.ticn{padding:0;width:24px;height:24px;display:flex;align-items:center;justify-content:center;color:var(--ec-fg-72);}
  .tact.ticn.on{background:var(--ec-fg-12);color:var(--ec-fg-96);}
  .tact.tback{display:inline-flex;align-items:center;gap:3px;padding-left:4px;}
  .asm-list{display:flex;flex-direction:column;padding-top:2px;}
  .asm-list .ilist-item{padding-left:6px;} /* no hierarchy here: items align with the group heading */
  .asm-item{display:flex;align-items:center;}
  .asm-item .asm-name{flex:1 1 0;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .asm-item .asm-cur{flex:0 0 16px;display:flex;align-items:center;justify-content:center;
    margin-left:6px;color:var(--ec-green);}
  .asm-item.cur{color:var(--ec-fg-100);}
  .asm-item.cur .dd-pre{color:var(--ec-green);}
  .asm-item.active{background:var(--ec-fg-12);box-shadow:inset 0 0 0 1px var(--ec-fg-16);}
  /* selected tool in the build list: clear fill + green accent bar so it reads as chosen */
  .lib-item.cur{background:var(--ec-fg-12);color:var(--ec-fg-100);box-shadow:inset 2px 0 0 var(--ec-green);}
  .lib-item.cur .asm-name{font-weight:600;}
  .ref-head{padding:6px 6px 2px 28px;color:var(--ec-fg-56);font:400 12px/16px var(--ec-font);}
  .opitem{display:flex;align-items:center;gap:8px;padding:2px 6px 2px 28px;color:var(--ec-fg-56);
    font:400 12px/16px var(--ec-font);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .opitem .op-dot{flex:0 0 4px;width:4px;height:4px;border-radius:50%;background:var(--ec-fg-24);}
  .opitem .op-name{flex:1 1 0;min-width:0;overflow:hidden;text-overflow:ellipsis;}
  .tool-sel{display:flex;align-items:center;gap:4px;padding:2px;}
  .spark{flex:0 0 24px;width:24px;height:24px;display:flex;align-items:center;justify-content:center;
    border:0;border-radius:4px;background:var(--ec-green);color:#0e1010;cursor:pointer;}
  .spark:hover{filter:brightness(1.1);}
  .selbox{flex:1 1 0;min-width:0;min-height:24px;}
  .selbox .movh{display:flex;align-items:center;justify-content:center;color:var(--ec-fg-56);flex:0 0 16px;margin-right:2px;}
  .edittool{flex:0 0 24px;width:24px;height:24px;display:flex;align-items:center;justify-content:center;
    border:0;border-radius:4px;background:var(--ec-fg-8);color:var(--ec-fg-72);cursor:pointer;}
  .edittool:hover{background:var(--ec-fg-16);color:var(--ec-fg-96);}
  /* read-only applies ONLY to lockable rows (Tool/Adapter); Station block always editable */
  .irows.ro .lockable .dropdown{pointer-events:none;background:transparent;}
  .irows.ro .lockable .dropdown .v{color:var(--ec-fg-56);}
  .irows.ro .lockable .dropdown .i16{display:none;}
  .irows.ro .lockable .rowbtn{display:none;}
  .ictl .duo-a{flex:1 1 0;min-width:0;}
  .ictl .duo-b{flex:0 0 52px;}
  .rowbtn{flex:0 0 20px;width:20px;height:20px;display:flex;align-items:center;justify-content:center;
    border:0;border-radius:4px;background:transparent;color:var(--ec-fg-56);cursor:pointer;padding:0;}
  .rowbtn:hover{background:var(--ec-fg-8);color:var(--ec-fg-96);}
  .rowbtn.on{background:var(--ec-fg-12);color:var(--ec-fg-96);}
  /* pin/lock: fix a component so the auto-pick keeps it; open lock shows on hover, closed lock is a persistent indicator */
  .pinbtn{opacity:.3;color:var(--ec-fg-56);}            /* barely-there hint by default */
  .irow:hover .pinbtn,.irow.sel .pinbtn{opacity:1;}     /* full button on row hover */
  .pinbtn.on{opacity:1;background:var(--ec-fg-12);color:var(--ec-yellow);}

  .dd-menu{position:fixed;z-index:1000;background:var(--ec-bg-96);
    -webkit-backdrop-filter:blur(12px);backdrop-filter:blur(12px);
    border:1px solid var(--ec-fg-24);
    border-radius:4px;padding:2px;display:flex;flex-direction:column;gap:1px;
    box-shadow:0 8px 24px rgba(0,0,0,.6);}
  .dd-opt{padding:4px 6px;border-radius:3px;color:var(--ec-fg-72);font:400 12px/16px var(--ec-font);
    cursor:pointer;white-space:nowrap;display:flex;align-items:center;}
  .dd-opt:hover{background:var(--ec-fg-8);color:var(--ec-fg-96);}
  .dd-opt.cur{color:var(--ec-fg-100);}
  .dd-count{margin-left:auto;color:var(--ec-fg-56);font-variant-numeric:tabular-nums;}
  .dd-check{flex:0 0 14px;margin-left:8px;color:var(--ec-green);display:inline-flex;align-items:center;justify-content:center;}
  .dd-opt.cur .dd-pre{color:var(--ec-green);}
  .dd-sep{height:1px;background:var(--ec-fg-12);margin:2px 0;}
  /* combobox footer: "no match" note + persistent "Open library" row */
  .dd-empty{padding:4px 6px;color:var(--ec-fg-56);font:400 12px/16px var(--ec-font);white-space:nowrap;}
  .dd-opt.dd-lib{gap:6px;color:var(--ec-fg-72);}
  .lib-ic{width:14px;height:14px;flex:0 0 14px;}
  /* "no match" placeholder + escape hatch to the full library (tools list) */
  .empty-state{display:flex;flex-direction:column;align-items:center;gap:8px;padding:20px 12px;text-align:center;}
  .empty-state .es-msg{color:var(--ec-fg-56);font:400 12px/16px var(--ec-font);}
  .empty-state .es-btn{display:inline-flex;align-items:center;gap:6px;border:0;cursor:pointer;
    padding:5px 10px;border-radius:4px;background:var(--ec-fg-12);color:var(--ec-fg-96);
    font:400 12px/16px var(--ec-font);}
  .empty-state .es-btn:hover{background:var(--ec-fg-16);}
  .dd-head{padding:5px 6px 2px;color:var(--ec-fg-56);font:400 12px/16px var(--ec-font);}
  .dd-pre{display:inline-block;min-width:28px;margin-right:6px;color:var(--ec-fg-56);
    font-variant-numeric:tabular-nums;}
  .dd-sw{display:inline-block;width:12px;height:12px;border-radius:50%;margin-right:8px;vertical-align:-2px;}

  /* ===== Light theme — чистая инверсия базовых цветов токенов ===== */
  [data-theme="light"]{
    --ec-bg:#f5f5f5; --ec-bg-96:rgba(245,245,245,.96); --ec-bg-80:rgba(245,245,245,.80);
    --ec-fg-100:#0e1010; --ec-fg-96:rgba(14,16,16,.96); --ec-fg-80:rgba(14,16,16,.80);
    --ec-fg-72:rgba(14,16,16,.72); --ec-fg-64:rgba(14,16,16,.64); --ec-fg-56:rgba(14,16,16,.56);
    --ec-fg-24:rgba(14,16,16,.24); --ec-fg-16:rgba(14,16,16,.16); --ec-fg-12:rgba(14,16,16,.12); --ec-fg-8:rgba(14,16,16,.08);
    --ec-fg-4:rgba(14,16,16,.04);
    /* --ec-green не меняется */
  }
  /* монохромные иконки (#f5f5f5) → инверсия под светлый фон; включённый (зелёный) тогл — исключение */
  [data-theme="light"] .app img{filter:invert(1);}
  [data-theme="light"] .app .tgl.on{filter:none;}

  /* кнопка переключения темы в рейке (инлайн-svg на currentColor) */
  .rbtn .theme-ic{width:20px;height:20px;display:grid;place-items:center;color:var(--ec-fg-80);}
  .rbtn:hover .theme-ic{color:var(--ec-fg-96);}
  .theme-ic svg{width:20px;height:20px;display:block;}
  .theme-ic .ic-sun{display:none;}
  [data-theme="light"] .theme-ic .ic-moon{display:none;}
  [data-theme="light"] .theme-ic .ic-sun{display:block;}

  #assetbank{display:none}
</style>
</head>

      if(it.sep){ var s=document.createElement('div'); s.className='dd-sep'; menu.appendChild(s); return; }
      if(it.head){ var h=document.createElement('div'); h.className='dd-head'; h.textContent=it.head; menu.appendChild(h); return; }
      var o = document.createElement('div');
      o.className = 'dd-opt' + (it.cur ? ' cur' : '');
      if(it.pre){ var pr = document.createElement('span'); pr.className = 'dd-pre'; pr.textContent = it.pre; o.appendChild(pr); }
      if(it.color){ var sw = document.createElement('span'); sw.className = 'dd-sw'; sw.style.background = it.color; o.appendChild(sw); }
      o.appendChild(document.createTextNode(it.label));
      if(it.count != null){ var cn = document.createElement('span'); cn.className = 'dd-count'; cn.textContent = it.count; o.appendChild(cn); }
      if(it.check || it.count != null){ var ck = document.createElement('span'); ck.className = 'dd-check'; ck.innerHTML = it.check ? SVG_CHECK : ''; o.appendChild(ck); }
      o.addEventListener('click', function(ev){ ev.stopPropagation(); if(it.onPick) it.onPick(); closeMenu(); });
      menu.appendChild(o);

    if(withLibrary){ /* component combobox: "no match" note when empty + a persistent "Open library" footer */
      if(!menu.querySelector('.dd-opt')){
        var em = document.createElement('div'); em.className = 'dd-empty'; em.textContent = 'No matching component'; menu.appendChild(em);

      var lib = document.createElement('div'); lib.className = 'dd-opt dd-lib'; lib.innerHTML = SVG_LIB + '<span>Open library</span>';
      lib.addEventListener('click', function(ev){ ev.stopPropagation(); closeMenu(); openLibrary(); });
      menu.appendChild(lib);
    }
    document.body.appendChild(menu);
    menu.style.left = anchorRect.left + 'px';
    menu.style.top = (anchorRect.bottom + 2) + 'px';
    if(minW) menu.style.minWidth = minW + 'px';
    if(owner) owner.classList.add('dd-open');
    openMenu = menu;

  function buildRow(p){

    }
    if(p.type==='refhead'){ /* reference section label — deliberately NOT a parameter row */
      var rh = document.createElement('div'); rh.className = 'ref-head'; rh.textContent = p.text; return rh;
    }
    if(p.type==='search'){
      var s = document.createElement('div'); s.className = 'search-row';
      s.innerHTML = '<span class="input search-box"><input type="text" placeholder="'+(p.placeholder||'')+'"></span>';
      return s;
    }
    if(p.type==='listitem'){
      var li = document.createElement('div');
      var cur = (p.val === PARAMS.Tool.head);
      li.className = 'ilist-item asm-item' + (cur ? ' sel cur' : '') + (p._libActive ? ' active' : '');
      if(p.gchild) li.dataset.group = p.gchild;
      if(typeof p._libIdx === 'number') li.dataset.idx = p._libIdx;
      li.innerHTML = '<span class="asm-name">'+p.val+'</span><span class="asm-cur">'+(cur?SVG_CHECK:'')+'</span>';
      return li;
    }
    if(p.type==='opitem'){ /* read-only reference: an operation this assembly is used in */
      var oi = document.createElement('div');
      oi.className = 'opitem';
      if(p.gchild){ oi.dataset.group = p.gchild; if(toolCollapsed[p.gchild]) oi.style.display = 'none'; }
      oi.innerHTML = '<span class="op-dot"></span><span class="op-name">'+p.val+'</span>';
      return oi;
    }
    /* --- parameter rows --- */
    var row = document.createElement('div');
    var chainThru = p.gchild && (p.gchild==='tool' || p.gchild==='adapter' || p.gchild==='adapter2' || p.gchild==='adapter3');
    row.className = 'irow' + (p.sel ? ' sel' : '') + (p.ghead && toolCollapsed[p.ghead] ? ' collapsed' : '') + (p.ctl==='readonly' ? ' roparam' : '') + (p.lock ? ' lockable' : '') + (p.chain ? ' chain' : '') + (chainThru ? ' chain-thru' : '') + (p.chainTop ? ' chain-top' : '') + (p.chainBottom ? ' chain-bottom' : '');
    if(p.ghead) row.dataset.ghead = p.ghead;
    if(p.gchild){ row.dataset.group = p.gchild; if(toolCollapsed[p.gchild]) row.style.display = 'none'; }
    var itlClass = 'itl' + (p.indent===1?' i1':p.indent===2?' i2':'');
    var shevHtml = p.shev
      ? '<img class="shev'+(p.ghead?' exp':'')+'" src="'+shevSrc(p.shev)+'">'
      : '<i class="shev"></i>';
    var lblCls = p.bold ? ' class="b"' : '';
    var optsA  = p.opts  ? ' data-opts="'+p.opts.join('|')+'"'  : '';
    var optsB  = p.opts2 ? ' data-opts="'+p.opts2.join('|')+'"' : '';
    var ctlHtml = '', between = (p.ctl==='toggle' || p.ctl==='pair') && !p.tight;
    if(p.ctl==='dropdown'){
      ctlHtml = '<span class="dropdown"'+optsA+'><span class="v">'+p.val+'</span><img class="i16" src="'+A.ddchev+'"></span>';
    } else if(p.ctl==='input'){
      ctlHtml = p.editable
        ? '<span class="input"><input class="vin" type="text" value="'+p.val+'"></span>'

    } else if(p.ctl==='readonly'){
      ctlHtml = '<span class="roval">'+p.val+'</span>';
    } else if(p.ctl==='toggle'){
      ctlHtml = '<img class="tgl'+(p.on?' on':'')+'" src="'+(p.on?A['tgl-on']:A['tgl-off'])+'">';
    } else if(p.ctl==='toggleInput'){
      ctlHtml = '<img class="tgl'+(p.on?' on':'')+'" src="'+(p.on?A['tgl-on']:A['tgl-off'])+'"><span class="input"><span class="v">'+p.val+'</span></span>';
    } else if(p.ctl==='pair'){
      ctlHtml = '<span class="ipair"><span class="bicn"><img class="i16" src="'+A['row-a']+'"></span><span class="bicn"><img class="i16" src="'+A['row-b']+'"></span></span>';
    } else if(p.ctl==='duo'){
      var duoB = p.duoBInput
        ? '<span class="input duo-b"><input class="vin" type="text" inputmode="numeric" value="'+p.val2+'"></span>' /* editable free number (e.g. spindle) */
        : '<span class="dropdown duo-b"'+optsB+'><span class="v">'+p.val2+'</span><img class="i16" src="'+A.ddchev+'"></span>'; /* slot from a list (e.g. turret) */
      ctlHtml = '<span class="dropdown duo-a"'+optsA+'><span class="v">'+p.val+'</span><img class="i16" src="'+A.ddchev+'"></span>'+duoB;
    }
    var trail;
    if(p.pinnable)     trail = ''; /* lock moved onto the chain node; no right-side button */
    else if(p.flipBtn) trail = '<button class="rowbtn flipbtn" title="Opposite spindle">'+flipSvg(!!p.flip)+'</button>';

    row.innerHTML =
      '<div class="ilbl">'+
        '<div class="'+itlClass+'">'+shevHtml+
          '<span class="rlabel"><span'+lblCls+'>'+p.label+'</span></span></div></div>'+
      (p.headonly ? '' : '<div class="ictl'+(between?' between':'')+'">'+ctlHtml+trail+'</div>');
    if(p.chain){
      var gn = document.createElement('i');
      gn.className = 'gnode' + (p.pinned ? ' locked' : '');
      gn.title = p.pinned ? 'Зафиксировано — нажмите, чтобы открепить' : 'Зафиксировать компонент';
      if(p.pinned) gn.innerHTML = SVG_GNODE_LOCK;

    }

  /* shared "no match" placeholder with a way out to the full library */
  function emptyState(msg){
    var w = document.createElement('div'); w.className = 'empty-state';
    w.innerHTML = '<div class="es-msg">'+msg+'</div>'+
      '<button class="es-btn" data-act="openLibrary">'+SVG_LIB+'<span>Open library</span></button>';
    return w;
  }
  function openLibrary(){ libQuery = ''; buildFilter = false; toolState = 'editTool'; renderToolTab(); }
  function flipSvg(on){ /* icn_flip 1/2 from Figma Core: active arrow full, the other dimmed (0.48) */
    var botLeft = on ? '0.48' : '1';   // bottom-left arrow
    var topRight = on ? '1' : '0.48';  // top-right arrow
    return '<svg viewBox="0 0 20 20" width="16" height="16" fill="var(--ec-fg-100)">'+
           '<path fill-opacity="'+botLeft+'" d="M8.14645 16.1464L3.85355 11.8536C3.53857 11.5386 3.76165 11 4.20711 11H14.5C14.7761 11 15 11.2239 15 11.5V12.5C15 12.7761 14.7761 13 14.5 13H9.5C9.22386 13 9 13.2239 9 13.5V15.7929C9 16.2383 8.46143 16.4614 8.14645 16.1464Z"/>'+
           '<path fill-opacity="'+topRight+'" d="M11.8536 3.85355L16.1464 8.14645C16.4614 8.46143 16.2383 9 15.7929 9H5.5C5.22386 9 5 8.77614 5 8.5V7.5C5 7.22386 5.22386 7 5.5 7H10.5C10.7761 7 11 6.77614 11 6.5V4.20711C11 3.76165 11.5386 3.53857 11.8536 3.85355Z"/></svg>';
  }

  function toolActions(){
    if(toolState==='pickAssembly' || toolState==='editTool')
      return '<button class="tact tback" data-act="backPick" title="Назад">'+SVG_BACK+'<span>Back</span></button>';
    /* assembly is always editable → only the "new assembly" (+) action */
    return '<button class="tact ticn" data-act="addAsm" title="Создать новую сборку">'+SVG_PLUS+'</button>';
  }
  function selectorRow(withEdit){
    var r = document.createElement('div');
    r.className = 'tool-sel';
    r.innerHTML =
      '<span class="dropdown selbox"><span class="v">'+PARAMS.Tool.head+'</span><img class="i16" src="'+A.ddchev+'"></span>'+
      (withEdit ? '<button class="edittool" data-act="editAsm" title="Редактировать сборку">'+SVG_EDIT+'</button>' : '');
    return r;
  }
  function pickItemsFlat(){ var a = []; TOOL_ASSEMBLIES.forEach(function(g){ g.items.forEach(function(o){ a.push(o.name); }); }); return a; }
  function findPreset(name){ for(var g=0;g<TOOL_ASSEMBLIES.length;g++){ var it=TOOL_ASSEMBLIES[g].items; for(var i=0;i<it.length;i++){ if(it[i].name===name) return it[i]; } } return null; }
  function mmVal(s){ var m = /([\d.]+)/.exec(s||''); return m ? parseFloat(m[1]) : 0; } /* numeric mm from a "125 mm" string */
  function totalOverhang(){ /* full tool projection from the spindle: stacks tool + holder + coupling + extension; recomputes as the assembly changes */
    var t  = META[asmRow('Tool').val]      || {};
    var a1 = META[asmRow('Adapter 1').val] || {};
    var a2 = META[asmRow('Adapter 2').val] || {};
    var a3 = META[asmRow('Adapter 3').val] || {};
    return Math.round(mmVal(t.l) + mmVal(a1.holder) + mmVal(a2.coupling) + mmVal(a3.ext));
  }
  function selHint(){ /* footer: live total overhang first; reuse note only when the assembly is shared by other operations */
    var p = findPreset(PARAMS.Tool.head), n = (p && p.ops) || 0;
    var el = document.createElement('div'); el.className = 'sel-foot';
    var html = '<span class="sb-item">Total overhang '+totalOverhang()+' mm</span>';
    if(n) html += '<i class="sb-sep"></i><span class="sb-item">Used in '+n+' operation'+(n===1?'':'s')+'</span>';
    el.innerHTML = html;
    return el;
  }
  function libItemsFlat(){ return LIBRARY.map(function(it){ return it.name; }); }
  function libList(){ /* expandable ready-made assemblies: each tool reveals its adapters (compatible alternatives) */
    var frag = document.createDocumentFragment();
    var q = libQuery.trim().toLowerCase(), any = false;
    LIBRARY.forEach(function(it, idx){
      if(q && it.name.toLowerCase().indexOf(q) < 0) return; /* search/filter narrows the list */
      any = true;
      var sel = (idx===toolLibIdx), exp = !!libExpanded[idx]; /* focused row = the chosen tool (always one selected) */
      var row = document.createElement('div');
      row.className = 'ilist-item asm-item lib-item' + (sel?' sel cur active':'');
      row.dataset.idx = idx;
      row.innerHTML =
        '<img class="shev exp libchev'+(exp?'':' collapsed')+'" data-libchev="'+idx+'" src="'+shevSrc('open')+'">'+
        '<span class="asm-name">'+it.name+'</span>'+
        '<span class="asm-cur">'+(sel?SVG_CHECK:'')+'</span>';
      frag.appendChild(row);
      if(exp) it.adapters.forEach(function(ad, ai){
        var ar = buildRow({label:'Adapter '+(ai+1), ctl:'dropdown', val:ad.val, opts:ad.opts, nomore:true, noHint:true, indent:1});
        ar.dataset.lib = idx; ar.dataset.adi = ai;
        frag.appendChild(ar);
      });
    });
    if(!any) frag.appendChild(emptyState('No matching tool found'));
    return frag;
  }
  function pickList(){
    var wrap = document.createElement('div');
    wrap.className = 'asm-list';
    var html = '', fi = -1;
    TOOL_ASSEMBLIES.forEach(function(g, gi){
      if(gi>0) html += '<div class="line"></div>';
      html += '<div class="dd-head">'+g.group+'</div>';
      var tn = 0;
      g.items.forEach(function(o){
        tn++; fi++;
        var on = (o.name===PARAMS.Tool.head);
        var active = (fi===toolPickIdx);
        html += '<div class="ilist-item asm-item'+(on?' cur':'')+(active?' active':'')+'" data-asm="'+o.name.replace(/"/g,'&quot;')+'" data-idx="'+fi+'">'+
                  '<span class="dd-pre">T#'+tn+'</span>'+
                  '<span class="asm-name">'+o.name+'</span>'+
                  '<span class="asm-cur">'+(on?SVG_CHECK:'')+'</span></div>';
      });
    });
    wrap.innerHTML = html;
    return wrap;
  }
  function focusPickRow(){ var a = irows.querySelector('.ilist-item.active, .asm-item.active'); if(a) a.scrollIntoView({block:'nearest'}); }
  function renderToolTab(){
    titleCtl.innerHTML = toolActions();
    inspTitle.innerHTML = (toolState==='editTool') /* build mode → breadcrumb: muted root (acts as Back) / bright current */
      ? '<span class="crumb-mut" data-act="backPick" title="Назад">Tool assembly</span><span class="crumb-sep">/</span><span class="crumb-cur">Add new</span>'
      : 'Tool assembly';
    irows.innerHTML = '';
    inspFoot.innerHTML = ''; // footer only shows for the assembly view
    irows.classList.remove('ro'); // assembly composition is always editable
    if(toolState==='pickAssembly'){ irows.appendChild(pickList()); return; }
    if(toolState==='editTool'){
      var sr = document.createElement('div'); sr.className = 'search-row';
      sr.innerHTML = '<span class="input search-box"><input type="text" placeholder="Search" value="'+libQuery.replace(/"/g,'&quot;')+'"></span>'+
        '<button class="rowbtn filterbtn'+(buildFilter?' on':'')+'" data-act="toggleBuildFilter" title="Параметры фильтра">'+SVG_FILTER+'</button>';
      irows.appendChild(sr);
      var d1 = document.createElement('div'); d1.className = 'line'; irows.appendChild(d1);
      if(buildFilter){ /* filter params appear under the search */
        PARAMS.Tool.tool.forEach(function(p){ var fr = buildRow(p); fr.classList.add('filt'); irows.appendChild(fr); });
        var d2 = document.createElement('div'); d2.className = 'line'; irows.appendChild(d2);
      }
      irows.appendChild(libList());
      return;
    }
    irows.appendChild(selectorRow(false));
    var d = document.createElement('div'); d.className = 'line'; irows.appendChild(d);
    PARAMS.Tool.assembly.forEach(function(p){
      var rw = buildRow(p);
      if(rw.classList.contains('irow')) rw.classList.add('comp'); /* left gutter for the stack graph */
      irows.appendChild(rw);
    });
    inspFoot.appendChild(selHint()); /* pinned footer: operations + live overhang */
  }
  function gotoTool(s){ if(s==='editTool' || s==='pickAssembly') toolPrev = toolState; editComp = null; toolState = s; renderToolTab(); }
  function toolRow(arr, label){ for(var i=0;i<arr.length;i++){ if(arr[i].label===label) return arr[i]; } return null; }
  /* ---------- Auto-pick: changing one component re-picks compatible partners (pinned ones are never touched) ---------- */
  function mKey(name){ return (META[name]||{}).k; }
  function pickByKey(list, key){ for(var i=0;i<list.length;i++){ if(mKey(list[i])===key) return list[i]; } return list[0]; }
  function stationKind(v){ return (v==='Spindle' || v==='Sub-spindle') ? 'spindle' : 'turret'; }
  function asmRow(label){ return toolRow(PARAMS.Tool.assembly, label); }
  function setRowVal(label, val){ var r=asmRow(label); if(r) r.val = val; }
  /* lock on the chain node: each component is fixed independently, by hand */
  function toggleLock(label){
    var me = asmRow(label);
    if(!me) return;
    me.pinned = !me.pinned;
    renderToolTab();
  }
  function clearLocks(){ PARAMS.Tool.assembly.forEach(function(p){ if(p.pinnable) p.pinned = false; }); } /* a new/different assembly resets all locks */
  function refreshChildren(){ /* pull read-only child dims from the selected component's metadata */
    var t = META[asmRow('Tool').val]||{};
    setRowVal('Diameter', t.d||'—'); setRowVal('Length (L)', t.l||'—'); setRowVal('Working length (WL)', t.wl||'—');
    setRowVal('Holder length', (META[asmRow('Adapter 1').val]||{}).holder||'—');
    setRowVal('Coupling length', (META[asmRow('Adapter 2').val]||{}).coupling||'—');
    setRowVal('Extension length', (META[asmRow('Adapter 3').val]||{}).ext||'—');
  }
  function reconcileAssembly(changed){
    var st=asmRow('Station'), tool=asmRow('Tool'), ad1=asmRow('Adapter 1'), ad2=asmRow('Adapter 2'), ad3=asmRow('Adapter 3');
    var kind=stationKind(st.val), c=CATALOG[kind];
    st.duoBInput = (kind==='spindle');                                  // turret = slot dropdown, spindle = free number input
    tool.opts=c.tool; ad1.opts=c.adapter; ad2.opts=c.adapter2; ad3.opts=c.adapter3; // filter lists by Station
    if(changed==='Station'){                                            // switched magazine kind → bring non-pinned parts into the new catalog
      if(!tool.pinned && c.tool.indexOf(tool.val)<0) tool.val=c.def.tool;
      if(!ad1.pinned  && c.adapter.indexOf(ad1.val)<0) ad1.val=c.def.adapter;
      if(!ad2.pinned  && c.adapter2.indexOf(ad2.val)<0) ad2.val=c.def.adapter2;
      if(!ad3.pinned  && c.adapter3.indexOf(ad3.val)<0) ad3.val=c.def.adapter3;
    }
    if(changed==='Tool' && !ad1.pinned && mKey(ad1.val)!==mKey(tool.val)) ad1.val=pickByKey(c.adapter, mKey(tool.val));
    if(changed==='Adapter 1' && !tool.pinned && mKey(tool.val)!==mKey(ad1.val)) tool.val=pickByKey(c.tool, mKey(ad1.val));
    refreshChildren();
  }
  /* pick a saved assembly preset → fill the whole composition (Tool / Adapter 1–3 / Station) */
  function applyAssembly(p){
    clearLocks(); // switching to another assembly drops all pins
    setRowVal('Tool', p.tool); setRowVal('Adapter 1', p.adapter); setRowVal('Adapter 2', p.adapter2); setRowVal('Adapter 3', p.adapter3||'No extension');
    var st=asmRow('Station'); st.val=p.station; if(p.position) st.val2=p.position;
    PARAMS.Tool.head = p.name;
    reconcileAssembly('Station'); // resync option lists (by station) + child dims; preset values already match the catalog
  }
  /* enter build/pick mode: '+' bumps the Station position to the next one, 'edit' keeps the current one */
  function enterBuild(increment){
    if(increment) clearLocks(); // creating a new assembly drops all pins
    var aSt = toolRow(PARAMS.Tool.assembly, 'Station');
    var tSt = toolRow(PARAMS.Tool.tool, 'Station');
    if(aSt && tSt){
      var n = parseInt(aSt.val2, 10); if(isNaN(n)) n = 0;
      tSt.val = aSt.val;                       // same magazine (Turret/Spindle)
      tSt.val2 = String(increment ? n + 1 : n); // '+' → next position; 'edit' → keep current
    }
    toolLibIdx = Math.max(0, libItemsFlat().indexOf(PARAMS.Tool.head)); // keyboard focus = current head
    gotoTool('editTool');
    focusPickRow();
  }

  function renderInspector(tab){
    if(tab==='Tool'){ renderToolTab(); return; }
    titleCtl.innerHTML = '';
    inspFoot.innerHTML = '';
    irows.classList.remove('ro');
    var cfg = PARAMS[tab] || [];
    var list = Array.isArray(cfg) ? cfg : (cfg.rows || []);
    irows.innerHTML = '';
    list.forEach(function(p){ irows.appendChild(buildRow(p)); });
  }
  document.querySelectorAll('.rbtn[data-tab]').forEach(function(b){
    b.addEventListener('click', function(){
      document.querySelectorAll('.rbtn[data-tab]').forEach(function(x){x.classList.remove('active');});
      b.classList.add('active');
      var tab = b.dataset.tab;
      if(tab){ toolState = 'view'; currentTab = tab; inspTitle.textContent = tab; renderInspector(tab); }
    });
  });
  /* Tool workflow actions: Edit / Cancel / Apply / edit-tool */
  document.addEventListener('click', function(e){
    var act = e.target.closest('[data-act]');
    if(!act) return;
    e.stopPropagation();
    var a = act.dataset.act;
    if(a==='editAsm') gotoTool('editAssembly');            /* edit assembly: pick tool/adapter */
    else if(a==='pickAsm'){ toolPickIdx = Math.max(0, pickItemsFlat().indexOf(PARAMS.Tool.head)); gotoTool('pickAssembly'); focusPickRow(); } /* full-panel picker, focus current */
    else if(a==='backPick') gotoTool(toolPrev||'view');    /* back from picker without changing selection */
    else if(a==='addAsm') enterBuild(true);                /* create new assembly → next Station position */
    else if(a==='toggleBuildFilter'){ buildFilter = !buildFilter; renderToolTab(); } /* build mode: show/hide filter params */
    else if(a==='openLibrary'){ closeMenu(); openLibrary(); }  /* "no match" escape hatch → full library */
    else if(a==='compTool'){ editComp='tool'; toolCollapsed.tool=false; renderToolTab(); }       /* edit tool params */
    else if(a==='compAdapter'){ editComp='adapter'; toolCollapsed.adapter=false; renderToolTab(); } /* edit adapter params */
    else if(a==='cancel' || a==='apply'){
      if(toolState==='editTool') gotoTool(toolPrev||'view');
      else if(editComp){ editComp=null; renderToolTab(); }  /* component edit → back to assembly edit */
      else gotoTool('view');                                /* assembly edit → view */
    }
  });
  /* keyboard navigation for any list mode: ↑/↓ moves focus AND applies immediately (check moves with focus); Enter/Esc closes */
  document.addEventListener('keydown', function(e){
    var picker = toolState==='pickAssembly', builder = toolState==='editTool';
    if(!picker && !builder) return;
    var flat = picker ? pickItemsFlat() : libItemsFlat();
    if(!flat.length) return;
    var idxVar = function(v){ if(picker) toolPickIdx = v; else toolLibIdx = v; };
    var idxCur = picker ? toolPickIdx : toolLibIdx;
    var apply = function(){ PARAMS.Tool.head = flat[picker?toolPickIdx:toolLibIdx]; renderToolTab(); focusPickRow(); };
    if(e.key==='ArrowDown'){ e.preventDefault(); idxVar(Math.min(idxCur+1, flat.length-1)); apply(); }
    else if(e.key==='ArrowUp'){ e.preventDefault(); idxVar(Math.max(idxCur-1, 0)); apply(); }
    else if(e.key==='Home'){ e.preventDefault(); idxVar(0); apply(); }
    else if(e.key==='End'){ e.preventDefault(); idxVar(flat.length-1); apply(); }
    else if(e.key==='Enter' || e.key==='Escape'){ e.preventDefault(); gotoTool(toolPrev||'view'); }
  });

  /* ---------- Theme toggle (light/dark) ---------- */
  var themeBtn = document.getElementById('themeBtn');
  if(themeBtn){
    themeBtn.addEventListener('click', function(){
      var root = document.documentElement;
      root.setAttribute('data-theme', root.getAttribute('data-theme') === 'light' ? 'dark' : 'light');
    });
  }

  /* ---------- Inspector interactions (event delegation) ---------- */
  irows.addEventListener('click', function(e){
    var tgl = e.target.closest('.tgl');
    if(tgl){ e.stopPropagation(); var on = tgl.classList.toggle('on'); tgl.src = on ? A['tgl-on'] : A['tgl-off']; return; }
    var node = e.target.closest('.gnode');
    if(node){
      e.stopPropagation();
      var nrow = node.closest('.irow'), nlbl = nrow && nrow.querySelector('.rlabel span').textContent;
      toggleLock(nlbl);
      return;
    }
    var flip = e.target.closest('.flipbtn');
    if(flip){
      e.stopPropagation();
      var frow = flip.closest('.irow'), flbl = frow && frow.querySelector('.rlabel span').textContent;
      var farr = (toolState==='editTool') ? PARAMS.Tool.tool : PARAMS.Tool.assembly;
      var fe = flbl && toolRow(farr, flbl);
      if(fe){ fe.flip = !fe.flip; renderToolTab(); }
      return;
    }
    var lchev = e.target.closest('.libchev');
    if(lchev){ e.stopPropagation(); var lci = parseInt(lchev.dataset.libchev, 10); libExpanded[lci] = !libExpanded[lci]; renderToolTab(); return; }
    var dd = e.target.closest('.dropdown');
    if(dd){
      e.stopPropagation();
      if(openMenu && openMenu._owner === dd){ closeMenu(); return; }
      var rect = dd.getBoundingClientRect(), items;
      if(dd.classList.contains('selbox')){
        /* assembly selector behaves as a plain combobox: grouped (Turret/Spindle) menu, pick applies in place */
        items = [];
        TOOL_ASSEMBLIES.forEach(function(g, gi){
          if(gi>0) items.push({sep:true});
          items.push({head:g.group});
          var tn = 0;
          g.items.forEach(function(o){
            tn++;
            var on = (o.name===PARAMS.Tool.head);
            items.push({pre:'T#'+tn, label:o.name, cur:on, check:on, count:(o.ops||0), onPick:function(){ applyAssembly(o); renderToolTab(); }});
          });
        });
      } else {
        var v = dd.querySelector('.v');
        var libAd = dd.closest('[data-lib]'); /* adapter dropdown inside a library assembly */
        var lrow = dd.closest('.irow'), lblEl = lrow && lrow.querySelector('.rlabel span');
        var pLabel = lblEl ? lblEl.textContent : null, isDuoB = dd.classList.contains('duo-b');
        var raw = dd.dataset.opts; /* undefined = no list given (use defaults); '' = a list filtered down to nothing */
        var opts = (raw === undefined) ? DD_OPTS.slice() : (raw ? raw.split('|') : []);
        if(opts.length && opts.indexOf(v.textContent) < 0) opts = [v.textContent].concat(opts);
        items = opts.map(function(o){ return {label:o, cur:o===v.textContent, onPick:function(){
          v.textContent = o;
          if(libAd){ var L = LIBRARY[+libAd.dataset.lib]; if(L && L.adapters[+libAd.dataset.adi]) L.adapters[+libAd.dataset.adi].val = o; return; }
          /* Tool tab edits apply live (no Apply): persist back to the data model */
          if(currentTab!=='Tool' || !pLabel) return;
          var entry = toolRow(PARAMS.Tool.assembly, pLabel);
          if(entry){
            if(isDuoB) entry.val2 = o; else entry.val = o;
            /* composition change → auto-pick compatible partners + re-filter lists, then re-render */
            if(!isDuoB && (pLabel==='Station' || pLabel==='Tool' || pLabel==='Adapter 1' || pLabel==='Adapter 2' || pLabel==='Adapter 3')){
              reconcileAssembly(pLabel); renderToolTab();
            }
          }
        }}; });
      }
      showMenu(rect, items, dd, rect.width, !dd.classList.contains('selbox') && !dd.closest('.filt')); /* component combobox → library footer; filters excluded */
      return;
    }
    var gshev = e.target.closest('.shev.exp');
    if(gshev){
      var ghrow = gshev.closest('.irow[data-ghead]');
      if(ghrow){
        e.stopPropagation();
        var gid = ghrow.dataset.ghead;
        var hide = !ghrow.classList.contains('collapsed');
        ghrow.classList.toggle('collapsed', hide);
        if(gid in toolCollapsed) toolCollapsed[gid] = hide;
        irows.querySelectorAll('[data-group="'+gid+'"]').forEach(function(x){ x.style.display = hide ? 'none' : ''; });
        return;
      }
    }
    var litem = e.target.closest('.ilist-item');
    if(litem){
      /* click on a list row only MOVES the selection (same as arrow keys); Back/Esc/Enter closes */
      if(litem.dataset.asm){
        PARAMS.Tool.head = litem.dataset.asm;
        toolPickIdx = parseInt(litem.dataset.idx, 10) || 0;
        renderToolTab(); focusPickRow();
      } else {
        var name = litem.querySelector('.asm-name');
        if(name){
          PARAMS.Tool.head = name.textContent;
          toolLibIdx = libItemsFlat().indexOf(name.textContent);
          renderToolTab(); focusPickRow();
        }
      }
      return;
    }
    var more = e.target.closest('.icn11');
    if(more){
      e.stopPropagation();
      showMenu(more.getBoundingClientRect(), [
        {label:'Reset value'}, {label:'Copy'}, {label:'Paste'}, {sep:true}, {label:'Reset to default'}
      ], null, 140);
      return;
    }
    var row = e.target.closest('.irow');
    if(row){ irows.querySelectorAll('.irow').forEach(function(x){x.classList.remove('sel');}); row.classList.add('sel'); }
  });
  /* editable row inputs (e.g. spindle position) persist live to the data model */
  irows.addEventListener('input', function(e){
    var sb = e.target.closest('.search-box input');
    if(sb){ /* live-filter the tools list; keep focus + caret across the re-render */
      libQuery = sb.value; var caret = sb.selectionStart;
      renderToolTab();
      var ni = irows.querySelector('.search-box input');
      if(ni){ ni.focus(); try{ ni.setSelectionRange(caret, caret); }catch(_){} }
      return;
    }
    var inp = e.target.closest('.vin'); if(!inp) return;
    var r = inp.closest('.irow'), lbl = r && r.querySelector('.rlabel span').textContent;
    var entry = lbl && toolRow(PARAMS.Tool.assembly, lbl);
    if(!entry) return;
    if(inp.closest('.duo-b')) entry.val2 = inp.value; else entry.val = inp.value;
  });

  reconcileAssembly('Station'); // seed option lists + child dims from the catalog
  renderInspector('Tool'); // initial
})();
</script>
</body>
</html>
